name: Deploy + Release (Coolify + Tailscale)

on:
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Coolify
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Connect to Tailscale (KEEP USING AUTHKEY)
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      # 3. Verify connectivity (debug safety)
      - name: Verify connectivity
        run: |
          tailscale ip
          ping -c 3 100.112.225.41

      # 4. Trigger Coolify Deploy (no build here)
      - name: Trigger Coolify Deploy
        run: |
          curl "http://100.112.225.41:8000/api/v1/deploy?uuid=vqfjn5vvmfam71o2f86ao917" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"

      # 5. Optional wait
      - name: Wait for deployment
        run: sleep 15

      # 6. Health check
      - name: Health check
        run: |
          curl -f http://100.112.225.41:8000 || exit 1

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
