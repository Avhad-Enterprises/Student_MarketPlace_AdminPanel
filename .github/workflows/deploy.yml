name: Auto Deploy + Auto Tag (Coolify + Tailscale)

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy-and-tag:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Get latest tag
      - name: Get latest tag
        id: get_tag
        run: |
          TAG=$(git tag -l "v*" --sort=-v:refname | head -n 1)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # 3. Calculate next version
      - name: Calculate next version
        id: next_tag
        run: |
          if [ -z "${{ steps.get_tag.outputs.tag }}" ]; then
            NEW_TAG="v1"
          else
            NUM=${{ steps.get_tag.outputs.tag }}
            NUM=${NUM#v}
            NEW_TAG="v$((NUM + 1))"
          fi
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "Next tag: $NEW_TAG"

      # 4. Create tag safely (no crash if exists)
      - name: Create Git tag
        run: |
          git fetch --tags
          if git rev-parse "${{ steps.next_tag.outputs.new_tag }}" >/dev/null 2>&1; then
            echo "Tag already exists, skipping"
          else
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git tag ${{ steps.next_tag.outputs.new_tag }}
            git push origin ${{ steps.next_tag.outputs.new_tag }}
          fi

      # 5. Connect to Tailscale (KEEP SAME - WORKING)
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      # 6. Verify network
      - name: Verify connectivity
        run: |
          tailscale ip
          ping -c 3 100.112.225.41

      # 7. Trigger Coolify Deploy
      - name: Deploy to Coolify
        run: |
          curl "http://100.112.225.41:8000/api/v1/deploy?uuid=vqfjn5vvmfam71o2f86ao917" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"

      # 8. Wait
      - name: Wait for deployment
        run: sleep 20

      # 9. Health check
      - name: Health check
        run: |
          curl -f http://100.112.225.41:8000 || exit 1
